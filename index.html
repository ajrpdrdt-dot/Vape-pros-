<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vape Pros</title>
  <meta name="description" content="Vape Pros: quality vape products, fast shipping, and trusted support." />
  <style>
    :root {
      --bg-1: #0f1c2e;
      --bg-2: #14395a;
      --ink: #f2f6fb;
      --muted: #c5d6e8;
      --accent: #40d4a0;
      --accent-2: #ffe08a;
      --panel: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      color: var(--ink);
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(64, 212, 160, 0.28), transparent 38%),
        radial-gradient(circle at 88% 14%, rgba(255, 224, 138, 0.2), transparent 40%),
        linear-gradient(160deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(920px, 100%);
      border: 1px solid var(--border);
      background: var(--panel);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: clamp(22px, 5vw, 48px);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 4.6rem);
      line-height: 1;
      letter-spacing: 0.01em;
      text-transform: uppercase;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
      max-width: 56ch;
      font-size: clamp(1rem, 2.6vw, 1.2rem);
    }

    .bar {
      margin-top: 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.92rem;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.08);
    }

    .chip.accent {
      border-color: transparent;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: #102433;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Vape Pros</h1>
    <p>
      Live on Vercel. Domain setup in progress for vapepros.com through GoDaddy DNS.
      This page is your deployment baseline and can be replaced with your full site content anytime.
    </p>
    <section class="bar" aria-label="Launch status">
      <span class="chip accent">Deployment Ready</span>
      <span class="chip">GitHub Connected</span>
      <span class="chip">Vercel Compatible</span>
    </section>
  </main>
</body>
</html>
